openapi: 3.0.0
info:
  title: Zorvyn Financial Dashboard API
  description: Enterprise REST API for managing users and financial records.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Authenticate a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Unauthorized
        
  /dashboard/summary:
    get:
      summary: Retrieves aggregated financial records metrics
      responses:
        '200':
          description: Financial metrics object
          
  /records:
    get:
      summary: Fetch paginated financial records
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: A list of financial records
    post:
      summary: Create a new financial record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - type
                - category
                - date
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [INCOME, EXPENSE]
                category:
                  type: string
                date:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '201':
          description: Record successfully created
          
  /records/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a specific record
      responses:
        '200':
          description: Record found
        '404':
          description: Record not found
    put:
      summary: Update a specific record
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [INCOME, EXPENSE]
                category:
                  type: string
                date:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Record successfully updated
    delete:
      summary: Delete a specific record
      responses:
        '204':
          description: Record successfully deleted
